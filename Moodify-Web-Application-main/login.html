    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- HEADER -->
    <header>

        <div class="logo">
            <img src="Images/Logo.png" alt="Moodify Logo">
        </div>

        <nav>
            <ul class="navbar">
                <li><a href="home.html">Home</a></li>

                <li class="dropdown">
                    <a href="#" class="dropbtn">Mood ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="happy.html">😄 Happy</a></li>
                        <li><a href="sad.html">😢 Sad</a></li>
                        <li><a href="love.html">😍 Love</a></li>
                        <li><a href="sleepy.html">😴 Sleepy</a></li>
                        <li><a href="calm.html">😇 Calm</a></li>
                        <li><a href="tension.html">😤 Tension</a></li>
                    </ul>
                </li>
                <li><a href="contact.php"  class="contact">Contact</a></li>
                <li><a href="login.html" class="log">Login</a></li>
                <li><a href="login.html?tab=signup" class="sign">Sign Up</a></li>
            </ul>
        </nav>

    </header>

        

    <!-- ─── Page Title ─── -->
    <h1 class="Page_Title">Log into your Moodify Account</h1>

    <!-- ─── Form Container ─── -->
    <div class="form_Container">

        <!-- Tab Buttons -->
        <div class="tab-headers">
            <button id="login-tab" onclick="switchTab('login')">Log In</button>
            <button id="signup-tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Form Content Box -->
        <div class="form-content">

            <!-- ─── LOGIN FORM ─── -->
            <form id="login-form" onsubmit="handleLogin(event)">

                <label id="username-label">Username</label>
                <input type="text" id="username" required>

                <label id="password-label">Password</label>
                <input type="password" id="password" required>

                <button type="submit" class="login-btn">Log In</button>

            </form>
            <!-- ─── END LOGIN FORM ─── -->

            <!-- ─── SIGNUP FORM ─── -->
            <form id="signup-form" onsubmit="handleSignup(event)">

                <label id="fullname-lable">Full Name</label>
                <input type="text" id="fullname" required>

                <label id="NewUsername-lable">Username</label>
                <input type="text" id="Newusername" required>

                <label id="email-lable">Email</label>
                <input type="email" id="email" required>

                <label id="newpassword-lable">Password</label>
                <input type="password" id="newpassword" required>

                <label id="confirm-password-lable">Confirm Password</label>
                <input type="password" id="confirm-password" required>

                <button type="submit" class="signup-btn">Sign Up</button>

            </form>
            <!-- ─── END SIGNUP FORM ─── -->

        </div>
        <!-- ─── END Form Content Box ─── -->

    </div>
    <!-- ─── END Form Container ─── -->

    <script src="js/login.js"></script>
</body>
</html>
